name: preview
on:
  pull_request:
    paths:
      - "**.typ"

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      # Find the single changed .typ file
      - id: find-typ
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '[.[].filename | select(endswith(".typ"))] | .[]')
          count=$(echo "$files" | grep -c '.' || true)
          if [ "$count" -ne 1 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "file=$files" >> "$GITHUB_OUTPUT"
          fi

      # Setup typst
      - if: steps.find-typ.outputs.skip == 'false'
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ^0.14.0

      # Setup fonts
      - if: steps.find-typ.outputs.skip == 'false'
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: fonts
          key: ${{ runner.os }}-fonts-1

      - if: steps.find-typ.outputs.skip == 'false'
        run: ./x prepare-fonts

      # Compile to PNG
      - if: steps.find-typ.outputs.skip == 'false'
        env:
          TYPST_FONT_PATHS: ./fonts
        run: |
          file="${{ steps.find-typ.outputs.file }}"
          tmp=$(mktemp)
          printf '#set page(height: auto, margin: 10pt)\n' | cat - "$file" > "$tmp"
          mv "$tmp" "$file"
          typst compile "$file" preview.png --ppi 144

      # Make the rendered image available to the privileged publisher workflow.
      - if: steps.find-typ.outputs.skip == 'false'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p preview-artifact
          cp preview.png preview-artifact/preview.png
          printf '{"pr_number":%s,"head_sha":"%s"}\n' "$PR_NUMBER" "$HEAD_SHA" > preview-artifact/metadata.json

      - if: steps.find-typ.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: typst-preview
          path: |
            preview-artifact/preview.png
            preview-artifact/metadata.json
          if-no-files-found: error
          retention-days: 7
