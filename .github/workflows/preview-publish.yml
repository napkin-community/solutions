name: preview-publish
on:
  workflow_run:
    workflows: ["preview"]
    types: [completed]

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion == 'success' &&
        toJSON(github.event.workflow_run.pull_requests) != '[]'
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: read
    steps:
      - id: find-artifact
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run_id = context.payload.workflow_run.id;

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner, repo, run_id, per_page: 100,
            });
            const artifact = artifacts.find(a => a.name === 'typst-preview' && !a.expired);

            if (!artifact) {
              core.info('No typst-preview artifact found; nothing to publish.');
              core.setOutput('found', 'false');
              return;
            }

            core.setOutput('found', 'true');

      - if: steps.find-artifact.outputs.found == 'true'
        uses: actions/download-artifact@v8
        with:
          name: typst-preview
          path: preview-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - if: steps.find-artifact.outputs.found == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            if (pr.state !== 'open') {
              core.info(`PR #${prNumber} is ${pr.state}; skipping preview publish.`);
              return;
            }
            if (pr.head.sha !== context.payload.workflow_run.head_sha) {
              core.info(`Skipping stale preview for ${context.payload.workflow_run.head_sha}; current PR head is ${pr.head.sha}.`);
              return;
            }

            const path = `pr-${prNumber}.png`;
            const content = fs.readFileSync('preview-artifact/preview.png', { encoding: 'base64' });

            let commitSha;

            // Check if _preview branch exists
            let branchExists = true;
            try {
              await github.rest.repos.getBranch({ owner, repo, branch: '_preview' });
            } catch (error) {
              if (error.status !== 404) throw error;
              branchExists = false;
            }

            if (!branchExists) {
              // Create branch with the PNG as the first commit
              const { data: blob } = await github.rest.git.createBlob({ owner, repo, content, encoding: 'base64' });
              const { data: tree } = await github.rest.git.createTree({
                owner, repo,
                tree: [{ path, mode: '100644', type: 'blob', sha: blob.sha }],
              });
              const { data: commit } = await github.rest.git.createCommit({
                owner, repo, message: `Preview for PR #${prNumber}`, tree: tree.sha, parents: [],
              });
              await github.rest.git.createRef({ owner, repo, ref: 'refs/heads/_preview', sha: commit.sha });
              commitSha = commit.sha;
            } else {
              // Get existing file SHA if updating
              let sha;
              try {
                const { data } = await github.rest.repos.getContent({ owner, repo, path, ref: '_preview' });
                sha = data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              const { data: uploaded } = await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path,
                message: `Preview for PR #${prNumber}`,
                content, branch: '_preview',
                ...(sha ? { sha } : {}),
              });
              commitSha = uploaded.commit.sha;
            }

            // Create or update PR comment
            const marker = '<!-- typst-preview -->';
            const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${commitSha}/${path}`;
            const body = `${marker}\n![preview](${imageUrl})`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }
